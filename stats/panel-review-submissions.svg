<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="180" viewBox="0 0 880 180" role="img" aria-label="Review Submissions stats and last 14 days">
  <style>
    .bg { fill: #161b22; }
    .border { fill: none; stroke: #30363d; stroke-width: 1; }
    .divider { stroke: #30363d; stroke-width: 1; }
    .title { font: 600 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #2ea043; }
    .big { font: 700 52px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #f0f6fc; }
    .big-label { font: 600 10px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; letter-spacing: 0.8px; }
    .row-label { font: 500 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
    .row-val { font: 600 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #f0f6fc; }
    .chart-title { font: 500 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; letter-spacing: 0.4px; }
    .tick { font: 500 10px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
    .grid { stroke: #21262d; stroke-width: 1; }
    .axis-line { stroke: #30363d; stroke-width: 1; }
  </style>
  <rect class="bg" x="0" y="0" width="880" height="180" rx="8" ry="8"/>
  <rect class="border" x="0.5" y="0.5" width="879" height="179" rx="8" ry="8"/>

  <circle cx="22" cy="30" r="4" fill="#2ea043"/>
