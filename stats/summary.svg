<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="200" viewBox="0 0 880 200" role="img" aria-label="Stats summary">
  <style>
    .bg { fill: #161b22; }
    .border { fill: none; stroke: #30363d; stroke-width: 1; }
    .divider { stroke: #30363d; stroke-width: 1; }
    .title { font: 600 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .big { font: 700 44px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #f0f6fc; }
    .big-label { font: 600 10px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; letter-spacing: 0.8px; }
    .row-label { font: 500 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
    .row-val { font: 600 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #f0f6fc; }
  </style>
  <rect class="bg" x="0" y="0" width="880" height="200" rx="8" ry="8"/>
  <rect class="border" x="0.5" y="0.5" width="879" height="199" rx="8" ry="8"/>

  <circle cx="24" cy="34" r="4" fill="#8957e5"/>
  <text class="title" x="36" y="39" fill="#8957e5">Closed Issues</text>

  <text class="big-label" x="24" y="66">ALL TIME</text>
  <text class="big" x="24" y="108">150</text>

  <line x1="24" y1="130" x2="269.33" y2="130" stroke="#30363d" stroke-width="1"/>

  <text class="row-label" x="24" y="155">This month (30d)</text>
  <text class="row-val" x="269.33" y="155" text-anchor="end">91</text>

  <text class="row-label" x="24" y="180">This week (7d)</text>
  <text class="row-val" x="269.33" y="180" text-anchor="end">12</text>
  <line class="divider" x1="293.33" x2="293.33" y1="24" y2="176"/>

  <circle cx="317.3333333333333" cy="34" r="4" fill="#1f6feb"/>
  <text class="title" x="329.3333333333333" y="39" fill="#1f6feb">Merged PRs</text>

  <text class="big-label" x="317.3333333333333" y="66">ALL TIME</text>
  <text class="big" x="317.3333333333333" y="108">342</text>

  <line x1="317.3333333333333" y1="130" x2="562.67" y2="130" stroke="#30363d" stroke-width="1"/>

  <text class="row-label" x="317.3333333333333" y="155">This month (30d)</text>
  <text class="row-val" x="562.67" y="155" text-anchor="end">61</text>

  <text class="row-label" x="317.3333333333333" y="180">This week (7d)</text>
  <text class="row-val" x="562.67" y="180" text-anchor="end">9</text>
  <line class="divider" x1="586.67" x2="586.67" y1="24" y2="176"/>

  <circle cx="610.6666666666666" cy="34" r="4" fill="#2ea043"/>
  <text class="title" x="622.6666666666666" y="39" fill="#2ea043">Review Submissions</text>

  <text class="big-label" x="610.6666666666666" y="66">ALL TIME</text>
  <text class="big" x="610.6666666666666" y="108">785</text>

  <line x1="610.6666666666666" y1="130" x2="856.00" y2="130" stroke="#30363d" stroke-width="1"/>

  <text class="row-label" x="610.6666666666666" y="155">This month (30d)</text>
  <text class="row-val" x="856.00" y="155" text-anchor="end">55</text>

  <text class="row-label" x="610.6666666666666" y="180">This week (7d)</text>
  <text class="row-val" x="856.00" y="180" text-anchor="end">20</text>
</svg>
